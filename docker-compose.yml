services:
  redis:
    image: redis:7-alpine
    container_name: geospatial-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network

  emotion-engine:
    build:
      context: ./services/emotion-engine
      dockerfile: Dockerfile.dev
    container_name: geospatial-emotion-engine
    ports:
      - "8000:8000"
    volumes:
      - ./services/emotion-engine:/app
      - ml_cache:/app/.cache
    restart: unless-stopped
    env_file:
      - ./services/emotion-engine/.env.local
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 300s
    networks:
      - app-network

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile.dev
    container_name: geospatial-worker
    volumes:
      - ./services/worker:/app
    env_file:
      - ./services/worker/.env.local
    environment:
      - REDIS_URL=redis://redis:6379
      - EMOTION_ENGINE_URL=http://emotion-engine:8000/api/audio/emotion
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      emotion-engine:
        condition: service_healthy
    networks:
      - app-network

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile.dev
    container_name: geospatial-web
    ports:
      - "3000:3000"
    volumes:
      - ./services/web:/app
    env_file:
      - ./services/web/.env.local
    environment:
      - REDIS_URL=redis://redis:6379
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    depends_on:
      - worker
    networks:
      - app-network

  telegram:
    build:
      context: ./services/telegram
      dockerfile: Dockerfile.dev
    container_name: geospatial-telegram
    env_file:
      - ./services/telegram/.env.local
    restart: unless-stopped
    networks:
      - app-network

volumes:
  redis_data:
  ml_cache:


networks:
  app-network:
    driver: bridge
